server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — rota qualquer para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend: chamadas de API
    location /api/ {
        proxy_pass         http://backend:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy para uploads de arquivos
    location /uploads/ {
        proxy_pass         http://backend:3002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Cache para assets estáticos gerados pelo Vite (nome com hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
